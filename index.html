<svg width="250" height="50" viewBox="0 0 250 50" fill="none" xmlns="http://w3.org">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://w3.org">
            <style>
                .container { display: flex; align-items: center; font-family: 'Segoe UI', Roboto, sans-serif; gap: 12px; height: 50px; background: white; }
                .icon-box { position: relative; width: 40px; height: 40px; background: #1e1e1e; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
                .ring-base { position: absolute; inset: 4px; border-radius: 50%; border: 3px solid #2d2d2d; box-sizing: border-box; }
                .ring-fill { position: absolute; inset: 4px; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--lvl-color); box-sizing: border-box; transform: rotate(var(--rotation)); }
                .lvl-val { color: var(--lvl-color); font-weight: bold; font-size: 15px; transform: skewX(-10deg); z-index: 2; }
                .text-data { font-weight: bold; font-size: 16px; color: #000; }
                .elo-val { color: #8e8e8e; font-weight: normal; font-size: 14px; margin-left: 5px; }
            </style>

            <div class="container" id="target">
                <div class="icon-box">
                    <div class="ring-base"></div>
                    <div class="ring-fill" id="ring"></div>
                    <div class="lvl-val" id="lvl-num">7</div>
                </div>
                <div class="text-data">Level <span id="lvl-txt">7</span> <span class="elo-val" id="elo-txt">1530 ELO</span></div>
            </div>

            <script><![CDATA[
                const params = new URLSearchParams(window.location.search);
                const lvl = params.get('lvl') || "7";
                const elo = params.get('elo') || "1500";
                
                const colors = {
                    "10": "#ff1a1a", "9": "#ff7b00", "8": "#ff7b00", "7": "#ffb800",
                    "6": "#ffb800", "5": "#ffb800", "4": "#ffb800", "3": "#00ff7f",
                    "2": "#00ff7f", "1": "#ffffff"
                };

                const color = colors[lvl] || "#fff";
                const root = document.getElementById('target');
                
                // Применяем переменные напрямую в CSS
                root.style.setProperty('--lvl-color', color);
                root.style.setProperty('--rotation', (lvl * 36) + 'deg');
                
                document.getElementById('lvl-num').textContent = lvl;
                document.getElementById('lvl-txt').textContent = lvl;
                document.getElementById('elo-txt').textContent = elo + " ELO";
            ]]></script>
        </div>
    </foreignObject>
</svg>
