<svg width="250" height="50" viewBox="0 0 250 50" fill="none" xmlns="http://w3.org">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://w3.org">
            <style>
                @import url('https://googleapis.com');
                
                .badge-wrapper { 
                    display: flex; 
                    align-items: center; 
                    gap: 12px; 
                    height: 50px; 
                    background-color: white; 
                    font-family: 'Roboto', sans-serif;
                }
                .faceit-circle {
                    position: relative;
                    width: 40px;
                    height: 40px;
                    background: #1e1e1e;
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }
                .ring-bg {
                    position: absolute;
                    inset: 4px;
                    border-radius: 50%;
                    border: 3.5px solid #2d2d2d;
                }
                .ring-active {
                    position: absolute;
                    inset: 4px;
                    border-radius: 50%;
                    border: 3.5px solid transparent;
                    border-top-color: var(--color);
                    border-right-color: var(--color);
                    transform: rotate(var(--rot));
                }
                .lvl-display {
                    color: var(--color);
                    font-weight: 900;
                    font-size: 16px;
                    transform: skewX(-10deg);
                    z-index: 10;
                }
                .text-info { font-weight: 700; font-size: 16px; color: black; }
                .elo-info { color: #8e8e8e; font-weight: 400; font-size: 14px; margin-left: 4px; }
            </style>

            <div class="badge-wrapper" id="root">
                <div class="faceit-circle">
                    <div class="ring-bg"></div>
                    <div class="ring-active" id="visual-ring"></div>
                    <div class="lvl-display" id="lvl-val">7</div>
                </div>
                <div class="text-info">
                    Level <span id="lvl-txt">7</span>
                    <span class="elo-info" id="elo-val">1530 ELO</span>
                </div>
            </div>

            <script type="text/javascript"><![CDATA[
                const params = new URLSearchParams(window.location.search);
                const lvl = params.get('lvl') || "7";
                const elo = params.get('elo') || "1500";
                
                const colors = {
                    "10": "#ff1a1a", "9": "#ff7b00", "8": "#ff7b00", "7": "#ffb800",
                    "6": "#ffb800", "5": "#ffb800", "4": "#ffb800", "3": "#00ff7f",
                    "2": "#00ff7f", "1": "#ffffff"
                };

                const rotations = {
                    "10": "0deg", "9": "45deg", "8": "10deg", "7": "45deg", 
                    "6": "10deg", "5": "-20deg", "4": "-50deg", "3": "0deg", "2": "-20deg", "1": "0deg"
                };

                const color = colors[lvl] || "#fff";
                const rot = rotations[lvl] || "0deg";
                const root = document.getElementById('root');
                
                root.style.setProperty('--color', color);
                root.style.setProperty('--rot', rot);
                
                document.getElementById('lvl-val').textContent = lvl;
                document.getElementById('lvl-txt').textContent = lvl;
                document.getElementById('elo-val').textContent = elo + " ELO";
            ]]></script>
        </div>
    </foreignObject>
</svg>
